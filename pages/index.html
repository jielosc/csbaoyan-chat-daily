<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>绿群日报</title>
  <meta name="description" content="按日期浏览保研信息日报，默认显示最新一期，支持静态部署到 GitHub Pages。" />
  <meta property="og:title" content="绿群日报 - CS Baoyan Chat Daily" />
  <meta property="og:description" content="每日 AI 总结绿群信息，打破 CS 保研信息差。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://jielosc.github.io/csbaoyan-chat-daily/" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>" />
  <link rel="stylesheet" href="./styles.css" />
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <script defer src="./vendor/marked.min.js"></script>
  <script defer src="./vendor/purify.min.js"></script>
  <script defer src="./app.js"></script>
</head>

<body>
  <div class="backdrop" aria-hidden="true"></div>
  <div class="site-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">CS Baoyan Chat Daily</p>
        <h1>绿群日报</h1>
        <p class="hero-summary">
          每日 AI 总结绿群信息，打破 CS 保研信息差
        </p>
      </div>
      <div class="hero-status">
        <a href="https://github.com/jielosc/csbaoyan-chat-daily" target="_blank" rel="noopener noreferrer"
          class="status-chip github-link" aria-label="GitHub Repository">
          <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" fill="currentColor">
            <path
              d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z">
            </path>
          </svg>
          GitHub
        </a>
        <span class="status-chip" id="report-count">0 篇日报</span>
        <button class="status-chip icon-btn" id="theme-toggle" aria-label="切换阅读模式" title="切换模式">
          <svg class="icon-sun" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg class="icon-moon" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
    </header>

    <div class="layout">
      <aside class="archive-panel" aria-label="日报归档">
        <div class="panel-heading">
          <p class="panel-kicker">Archive</p>
          <h2>日期切换</h2>
        </div>
        <nav class="archive-list" id="archive-list">
          <div class="archive-placeholder">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </nav>
      </aside>

      <main class="reader-panel">
        <section class="reader-intro">
          <p class="reader-label" id="active-date-label">正在加载日报...</p>
        </section>

        <section class="report-card" aria-live="polite">
          <div class="loading-state" id="loading-state">
            <div class="loading-line wide"></div>
            <div class="loading-line"></div>
            <div class="loading-line narrow"></div>
          </div>
          <article class="report-content" id="report-content"></article>
        </section>
      </main>
    </div>

    <footer class="site-footer">
      <div class="footer-links">
        <span>绿群：<a href="https://github.com/CS-BAOYAN" target="_blank" rel="noopener noreferrer">CS-BAOYAN
            社区</a></span>
        <span class="divider" aria-hidden="true">|</span>
        <span>欢迎 <a href="https://github.com/jielosc/csbaoyan-chat-daily" target="_blank" rel="noopener noreferrer">提交
            PR 或 Issue</a> 共同维护</span>
      </div>
      <p class="disclaimer-note">
        内容来自群聊并由 AI 整理归纳，仅供参考；涉及时效性、主观经验和未核实内容时，请以官方通知和公开资料为准。
      </p>
    </footer>
  </div>
</body>

</html>
