<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>绿群日报</title>
  <meta name="description" content="按日期浏览保研信息日报，默认显示最新一期，支持静态部署到 GitHub Pages。" />
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="./vendor/marked.min.js"></script>
  <script defer src="./vendor/purify.min.js"></script>
  <script defer src="./app.js"></script>
</head>

<body>
  <div class="backdrop" aria-hidden="true"></div>
  <div class="site-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">CS Baoyan Chat Daily</p>
        <h1>绿群日报</h1>
      </div>
      <div class="hero-status">
        <a href="https://github.com/jielosc/csbaoyan-chat-daily" target="_blank" rel="noopener noreferrer" class="status-chip github-link" aria-label="GitHub Repository">
          <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" fill="currentColor">
            <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
          </svg>
          GitHub
        </a>
        <span class="status-chip" id="report-count">0 篇日报</span>
      </div>
    </header>

    <div class="layout">
      <aside class="archive-panel" aria-label="日报归档">
        <div class="panel-heading">
          <p class="panel-kicker">Archive</p>
          <h2>日期切换</h2>
        </div>
        <nav class="archive-list" id="archive-list">
          <div class="archive-placeholder">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </nav>
      </aside>

      <main class="reader-panel">
        <section class="reader-intro">
          <p class="reader-label" id="active-date-label">正在加载日报...</p>
        </section>

        <section class="report-card" aria-live="polite">
          <div class="loading-state" id="loading-state">
            <div class="loading-line wide"></div>
            <div class="loading-line"></div>
            <div class="loading-line narrow"></div>
          </div>
          <article class="report-content" id="report-content"></article>
        </section>
      </main>
    </div>

    <footer class="site-footer">
      <p class="disclaimer-note">
        内容来自群聊整理与公开信息交叉归纳，仅供参考；涉及时效性、主观经验和未核实内容时，请以官方通知和公开资料为准。
      </p>
    </footer>
  </div>
</body>

</html>
