<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>绿群日报</title>
  <meta name="description" content="按日期浏览保研信息日报，默认显示最新一期，支持静态部署到 GitHub Pages。" />
  <meta property="og:title" content="绿群日报 - CS Baoyan Chat Daily" />
  <meta property="og:description" content="每日 AI 总结绿群信息，打破 CS 保研信息差。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://jielosc.github.io/csbaoyan-chat-daily/" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>" />
  <link rel="stylesheet" href="./styles.css?v=20260319i" />
  <script>
    const savedTheme = localStorage.getItem('theme') || 'system';
    if (savedTheme === 'dark' || (savedTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <script defer src="./vendor/marked.min.js"></script>
  <script defer src="./vendor/purify.min.js"></script>
  <script defer src="./app.js?v=20260319c"></script>
</head>

<body>
  <div class="backdrop" aria-hidden="true"></div>
  <div class="site-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">CS Baoyan Chat Daily</p>
        <h1>绿群日报</h1>
        <p class="hero-summary">
          每日 AI 总结绿群信息，打破 CS 保研信息差
        </p>
      </div>
      <div class="hero-status">
        <a href="https://github.com/jielosc/csbaoyan-chat-daily" target="_blank" rel="noopener noreferrer"
          class="status-chip github-link" aria-label="GitHub Repository">
          <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" fill="currentColor">
            <path
              d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z">
            </path>
          </svg>
          GitHub
        </a>
        <span class="status-chip" id="report-count">0 篇日报</span>
        <button class="status-chip icon-btn" id="search-btn" aria-label="搜索日报" title="搜索">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <button class="status-chip icon-btn" id="theme-toggle" aria-label="切换阅读模式" title="切换模式">
          <svg class="icon-sun" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg class="icon-moon" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg class="icon-system" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
        </button>
      </div>
    </header>

    <div class="layout">
      <main class="reader-panel">
        <section class="reader-intro">
          <p class="reader-label" id="active-date-label">内容覆盖 05:00 至次日 05:00，每天 06:30 自动更新</p>
          <section class="date-switcher" id="date-switcher" aria-label="日期切换">
            <div class="date-switcher-bar">
              <button class="date-nav-btn" id="prev-date-btn" type="button" aria-label="上一条日报" title="上一条日报">
                <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
              </button>
              <button class="date-current-btn" id="current-date-btn" type="button" aria-controls="date-switcher-popover"
                aria-expanded="false" aria-label="当前日报日期，打开日期列表">
                <span class="date-current-value" id="date-switcher-current">正在加载...</span>
                <svg class="date-current-caret" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>
              <button class="date-nav-btn" id="next-date-btn" type="button" aria-label="下一条日报" title="下一条日报">
                <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
            </div>
            <div class="date-switcher-popover" id="date-switcher-popover" hidden>
              <div class="date-switcher-popover-head">
                <p class="date-switcher-kicker">Archive</p>
                <p class="date-switcher-title">选择日报日期</p>
              </div>
              <div class="date-switcher-list" id="date-switcher-list">
                <div class="date-switcher-empty">正在加载日期列表...</div>
              </div>
            </div>
          </section>
        </section>

        <section class="report-card" aria-live="polite">
          <div class="loading-state" id="loading-state">
            <div class="loading-line wide"></div>
            <div class="loading-line"></div>
            <div class="loading-line narrow"></div>
          </div>
          <article class="report-content" id="report-content"></article>
        </section>
      </main>
    </div>

    <footer class="site-footer">
      <div class="footer-links">
        <span>绿群：<a href="https://github.com/CS-BAOYAN" target="_blank" rel="noopener noreferrer">CS-BAOYAN
            社区</a></span>
        <span class="divider" aria-hidden="true">|</span>
        <span>欢迎 <a href="https://github.com/jielosc/csbaoyan-chat-daily" target="_blank" rel="noopener noreferrer">提交
            PR 或 Issue</a> 共同维护</span>
      </div>
      <p class="disclaimer-note">
        内容来自群聊并由 AI 整理归纳，仅供参考；涉及时效性、主观经验和未核实内容时，请以官方通知和公开资料为准。
      </p>
    </footer>
  </div>

  <div class="search-modal" id="search-modal" aria-hidden="true" hidden>
    <div class="search-backdrop" id="search-backdrop"></div>
    <div class="search-container">
      <div class="search-header">
        <svg class="search-icon" aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search-input" class="search-input" placeholder="搜索所有日报内容..." autocomplete="off">
        <button class="icon-btn close-search-btn" id="close-search-btn" aria-label="关闭搜索">
          <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="search-results" id="search-results">
        <div class="search-placeholder">输入关键词开始搜索...</div>
      </div>
    </div>
  </div>
</body>

</html>
